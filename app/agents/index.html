<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
<title>Agent | STILO AI PARTNERS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a2e;
    --bg-elev: #22223a;
    --border: rgba(168,85,247,0.14);
    --border-hover: rgba(168,85,247,0.32);
    --text-primary: #f0f0f5;
    --text-secondary: #8a8aa0;
    --text-muted: #5a5a75;
    --purple: #a855f7;
    --purple-dark: #7c3aed;
    --purple-light: #c084fc;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }
  a { color: var(--purple-light); text-decoration: none; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar .logo { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; letter-spacing: -0.03em; font-size: 1.05rem; }
  .topbar nav { display: flex; gap: 20px; font-size: 14px; }
  .topbar nav a { color: var(--text-secondary); }
  .topbar nav a.active, .topbar nav a:hover { color: var(--text-primary); }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

  .agent-header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .agent-header .avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(168,85,247,0.35), rgba(30,20,60,0.95));
    border: 1px solid rgba(168,85,247,0.4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .agent-header .avatar svg { width: 56px; height: 56px; }
  .agent-header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 2rem; letter-spacing: 0.02em;
    line-height: 1;
  }
  .agent-header .role { color: var(--text-secondary); font-size: 15px; margin-top: 6px; }
  .agent-header .status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 999px;
    background: rgba(34,197,94,0.12); color: var(--green);
    margin-top: 10px;
  }
  .agent-header .status.onboarding { background: rgba(245,158,11,0.12); color: var(--amber); }
  .agent-header .status.paused { background: rgba(239,68,68,0.12); color: var(--red); }
  .agent-header .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .kpi-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 768px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
  .kpi {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .kpi .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .kpi .value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.75rem; font-weight: 800; margin-top: 8px; letter-spacing: -0.02em; }
  .kpi .delta { font-size: 12px; margin-top: 4px; color: var(--green); font-weight: 600; }
  .kpi .delta.neg { color: var(--red); }

  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

  .sparkline { width: 100%; height: 120px; }

  .activity-list { list-style: none; }
  .activity-list li {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .activity-list li:last-child { border-bottom: none; }
  .activity-list li strong { color: var(--text-primary); font-weight: 500; }
  .activity-list .when { font-size: 12px; color: var(--text-muted); }

  .action-bar {
    display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--text-primary);
    transition: all 0.15s ease;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--border-hover); }
  .btn.primary {
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    border-color: transparent;
  }

  .config-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
  }
  @media (max-width: 640px) { .config-grid { grid-template-columns: 1fr; } }
  .config-row {
    display: flex; justify-content: space-between;
    padding: 10px 12px;
    background: var(--bg-elev);
    border-radius: 8px;
    font-size: 13px;
  }
  .config-row .k { color: var(--text-muted); }
  .config-row .v { color: var(--text-primary); font-weight: 500; }

  .back-link { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; display: inline-block; }
  .back-link:hover { color: var(--purple-light); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="logo">STILO AI PARTNERS</div>
    <nav>
      <a href="/app">Dashboard</a>
      <a href="#" class="active">Agents</a>
      <a href="#" onclick="window.supabaseSignOut && window.supabaseSignOut();return false;">Sign out</a>
    </nav>
  </header>

  <main class="container">
    <a class="back-link" href="/app">← All agents</a>

    <section class="agent-header">
      <div class="avatar" id="agentAvatar"></div>
      <div>
        <h1 id="agentCodename">—</h1>
        <div class="role" id="agentRole">—</div>
        <div class="status" id="agentStatus">active</div>
      </div>
    </section>

    <section class="kpi-row" id="kpiRow"></section>

    <section class="panel">
      <h2 id="primaryMetricLabel">30-day trend</h2>
      <svg class="sparkline" id="sparkline" viewBox="0 0 800 120" preserveAspectRatio="none"></svg>
    </section>

    <section class="panel">
      <h2>Recent activity</h2>
      <ul class="activity-list" id="activityList"></ul>
    </section>

    <section class="panel">
      <h2>Configuration</h2>
      <div class="config-grid" id="configGrid"></div>
    </section>

    <section class="panel">
      <h2>Need help with this agent?</h2>
      <p style="color:var(--text-secondary);font-size:14px;">Email your STILO team or book a 15-minute call. We manage and tune every agent weekly.</p>
      <div class="action-bar">
        <a class="btn primary" id="emailBtn" href="#">Email STILO Team</a>
        <a class="btn" href="https://calendly.com/stiloaiconsulting/15min" target="_blank" rel="noopener">Book 15-min Call</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { ROBOTS } from '/assets/agents/robots.js';

    // ============================================
    // Agent configuration
    // ============================================
    const AGENTS = {
      echo:   { name: 'ECHO',   role: 'AI Receptionist',       primary: 'calls_handled',      kpis: [
        {key:'calls_handled', label:'Calls handled', fmt:'int'},
        {key:'avg_duration', label:'Avg duration', fmt:'duration'},
        {key:'booked_appointments', label:'Appointments booked', fmt:'int'},
        {key:'missed_calls', label:'Missed calls', fmt:'int', invert:true}
      ]},
      ignite: { name: 'IGNITE', role: 'Lead Response Agent',   primary: 'leads_received',     kpis: [
        {key:'leads_received', label:'Leads received', fmt:'int'},
        {key:'response_time_avg', label:'Avg response', fmt:'seconds'},
        {key:'qualified', label:'Qualified leads', fmt:'int'},
        {key:'conversion_rate', label:'Conversion rate', fmt:'percent'}
      ]},
      revive: { name: 'REVIVE', role: 'Customer Reactivation', primary: 'dormant_engaged',    kpis: [
        {key:'dormant_engaged', label:'Dormant engaged', fmt:'int'},
        {key:'replies', label:'Replies', fmt:'int'},
        {key:'recovered_revenue', label:'Recovered revenue', fmt:'usd'},
        {key:'churn_saved', label:'Churn saved', fmt:'int'}
      ]},
      scout:  { name: 'SCOUT',  role: 'Lead Generator',        primary: 'prospects_found',    kpis: [
        {key:'prospects_found', label:'Prospects found', fmt:'int'},
        {key:'contacted', label:'Contacted', fmt:'int'},
        {key:'meetings_set', label:'Meetings set', fmt:'int'},
        {key:'pipeline_value', label:'Pipeline value', fmt:'usd'}
      ]},
      forge:  { name: 'FORGE',  role: 'AI Website',            primary: 'page_views',         kpis: [
        {key:'page_views', label:'Page views', fmt:'int'},
        {key:'conversion_rate', label:'Conversion rate', fmt:'percent'},
        {key:'avg_session', label:'Avg session', fmt:'duration'},
        {key:'leads_captured', label:'Leads captured', fmt:'int'}
      ]},
      signal: { name: 'SIGNAL', role: 'AI SEO (GEO)',          primary: 'ai_impressions',     kpis: [
        {key:'ai_impressions', label:'AI impressions', fmt:'int'},
        {key:'ranked_queries', label:'Ranked queries', fmt:'int'},
        {key:'citations', label:'Citations', fmt:'int'},
        {key:'click_throughs', label:'Click-throughs', fmt:'int'}
      ]},
      oracle: { name: 'ORACLE', role: 'Growth Intelligence',   primary: 'reports_delivered',  kpis: [
        {key:'reports_delivered', label:'Reports delivered', fmt:'int'},
        {key:'anomalies_flagged', label:'Anomalies flagged', fmt:'int'},
        {key:'forecast_accuracy', label:'Forecast accuracy', fmt:'percent'},
        {key:'opportunities', label:'Opportunities', fmt:'int'}
      ]},
      flux:   { name: 'FLUX',   role: 'Custom Automations',    primary: 'automations_running',kpis: [
        {key:'automations_running', label:'Automations running', fmt:'int'},
        {key:'tasks_executed', label:'Tasks executed', fmt:'int'},
        {key:'hours_saved', label:'Hours saved', fmt:'int'},
        {key:'error_rate', label:'Error rate', fmt:'percent', invert:true}
      ]}
    };

    // ============================================
    // Determine agent from URL
    // ============================================
    const params = new URLSearchParams(window.location.search);
    const agentId = (params.get('agent') || 'echo').toLowerCase();
    const agent = AGENTS[agentId] || AGENTS.echo;

    // ============================================
    // Formatters
    // ============================================
    function fmt(v, type) {
      if (v == null || v === undefined) return '—';
      if (type === 'int') return Math.round(v).toLocaleString();
      if (type === 'percent') return v.toFixed(1) + '%';
      if (type === 'usd') return '$' + Math.round(v).toLocaleString();
      if (type === 'duration') {
        const m = Math.floor(v / 60), s = Math.round(v % 60);
        return m + 'm ' + s + 's';
      }
      if (type === 'seconds') return Math.round(v) + 's';
      return String(v);
    }

    // ============================================
    // Deterministic seed (mock data when DB empty)
    // ============================================
    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return Math.abs(h);
    }
    function seededSeries(seed, baseline, variance, days=30) {
      const out = [];
      let v = baseline;
      for (let i = 0; i < days; i++) {
        const r = ((hashStr(seed + ':' + i) % 1000) / 1000) - 0.5;
        v = Math.max(0, baseline + r * variance + Math.sin(i/4) * (variance*0.2));
        out.push(Math.max(0, v));
      }
      return out;
    }
    function buildMockMetrics(clientId) {
      const seed = clientId + ':' + agentId;
      const series = seededSeries(seed, 40, 20);
      const today = series[series.length - 1];
      const base = {
        calls_handled: Math.round(today * 1.2),
        avg_duration: 142 + (hashStr(seed)%40),
        booked_appointments: Math.round(today * 0.35),
        missed_calls: Math.max(0, Math.round(today*0.05)),
        leads_received: Math.round(today * 1.5),
        response_time_avg: 4 + (hashStr(seed+'r')%6),
        qualified: Math.round(today * 0.6),
        conversion_rate: 22 + (hashStr(seed+'c')%18),
        dormant_engaged: Math.round(today * 2.5),
        replies: Math.round(today * 0.4),
        recovered_revenue: Math.round(today * 120),
        churn_saved: Math.round(today * 0.25),
        prospects_found: Math.round(today * 8),
        contacted: Math.round(today * 5),
        meetings_set: Math.round(today * 0.5),
        pipeline_value: Math.round(today * 450),
        page_views: Math.round(today * 25),
        avg_session: 95 + (hashStr(seed+'s')%60),
        leads_captured: Math.round(today * 0.7),
        ai_impressions: Math.round(today * 12),
        ranked_queries: Math.round(today * 0.4),
        citations: Math.round(today * 0.3),
        click_throughs: Math.round(today * 1.1),
        reports_delivered: Math.round(today / 7),
        anomalies_flagged: Math.round(today * 0.15),
        forecast_accuracy: 82 + (hashStr(seed+'f')%12),
        opportunities: Math.round(today * 0.3),
        automations_running: 6 + (hashStr(seed+'a')%6),
        tasks_executed: Math.round(today * 14),
        hours_saved: Math.round(today * 0.8),
        error_rate: (hashStr(seed+'e')%15)/10
      };
      return { series, current: base };
    }

    // ============================================
    // Supabase
    // ============================================
    const SUPABASE_URL = 'https://zsrskphpvgautfgklgxf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcnNrcGhwdmdhdXRmZ2tsZ3hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDk5NzksImV4cCI6MjA5MTcyNTk3OX0._A3Jhp_C3z2vVIaPq97vFpNehPDrjpieBeGTzQ9K-i0';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.supabaseSignOut = async function() { await sb.auth.signOut(); window.location.href = '/auth.html'; };

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/auth.html'; return; }
      const userId = session.user.id;

      // Render header
      document.title = agent.name + ' | STILO AI PARTNERS';
      document.getElementById('agentCodename').textContent = agent.name;
      document.getElementById('agentRole').textContent = agent.role;
      const robot = ROBOTS[agentId];
      if (robot) document.getElementById('agentAvatar').innerHTML = robot.svg;

      // Find client_agent row for this agent type
      const { data: clientAgents } = await sb.from('client_agents')
        .select('*').eq('client_id', userId).eq('agent_type', agentId).limit(1);
      const ca = clientAgents && clientAgents[0];
      if (ca) {
        const statusEl = document.getElementById('agentStatus');
        statusEl.textContent = ca.status;
        statusEl.className = 'status ' + ca.status;
      }

      // Load metrics
      let metrics = [];
      if (ca) {
        const since = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
        const res = await sb.from('agent_metrics')
          .select('*').eq('client_agent_id', ca.id)
          .gte('metric_date', since).order('metric_date', {ascending: true});
        metrics = res.data || [];
      }

      let series, current;
      if (metrics.length > 0) {
        series = metrics.map(m => m.metrics[agent.primary] || 0);
        current = metrics[metrics.length - 1].metrics;
      } else {
        const mock = buildMockMetrics(userId);
        series = mock.series;
        current = mock.current;
      }

      renderKPIs(current);
      renderSparkline(series);
      renderActivity(metrics, current);
      renderConfig(ca ? ca.config : {});

      // Email button
      const email = 'remyleon11@gmail.com';
      const subject = encodeURIComponent('Question about ' + agent.name + ' (' + agent.role + ')');
      document.getElementById('emailBtn').href = 'mailto:' + email + '?subject=' + subject;
    }

    function renderKPIs(data) {
      const row = document.getElementById('kpiRow');
      row.innerHTML = agent.kpis.map(k => {
        const val = data[k.key];
        return '<div class="kpi"><div class="label">' + k.label + '</div><div class="value">' + fmt(val, k.fmt) + '</div><div class="delta">last 30 days</div></div>';
      }).join('');
      document.getElementById('primaryMetricLabel').textContent = agent.kpis[0].label + ' — 30-day trend';
    }

    function renderSparkline(series) {
      const svg = document.getElementById('sparkline');
      const w = 800, h = 120, pad = 8;
      const max = Math.max(...series, 1);
      const step = (w - pad*2) / Math.max(series.length - 1, 1);
      const pts = series.map((v,i) => [pad + i*step, h - pad - (v/max)*(h - pad*2)]);
      const linePath = 'M ' + pts.map(p => p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L ');
      const areaPath = linePath + ' L ' + pts[pts.length-1][0] + ',' + (h-pad) + ' L ' + pts[0][0] + ',' + (h-pad) + ' Z';
      svg.innerHTML =
        '<defs><linearGradient id="sparkG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a855f7" stop-opacity="0.35"/><stop offset="1" stop-color="#a855f7" stop-opacity="0"/></linearGradient></defs>' +
        '<path d="' + areaPath + '" fill="url(#sparkG)"/>' +
        '<path d="' + linePath + '" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    }

    function renderActivity(metrics, current) {
      const list = document.getElementById('activityList');
      const items = [];
      if (metrics && metrics.length) {
        metrics.slice(-5).reverse().forEach(m => {
          items.push('<li><strong>' + fmt(m.metrics[agent.primary], agent.kpis[0].fmt) + ' ' + agent.kpis[0].label.toLowerCase() + '</strong><span class="when">' + m.metric_date + '</span></li>');
        });
      } else {
        const today = new Date();
        for (let i = 0; i < 5; i++) {
          const d = new Date(today.getTime() - i*86400000);
          items.push('<li><strong>' + agent.name + ' processed ' + (Math.round((current[agent.primary]||0) * (0.9 + Math.random()*0.2))) + ' ' + agent.kpis[0].label.toLowerCase() + '</strong><span class="when">' + d.toISOString().split('T')[0] + '</span></li>');
        }
      }
      list.innerHTML = items.join('');
    }

    function renderConfig(config) {
      const grid = document.getElementById('configGrid');
      const defaults = {
        echo:   { 'Greeting': 'Custom', 'Transfer number': 'On', 'After-hours': 'Voicemail + SMS', 'Language': 'English' },
        ignite: { 'Response SLA': '< 5s', 'Channels': 'Email + SMS', 'Qualifying': 'On', 'Routing': 'Calendar' },
        revive: { 'Dormancy threshold': '6 months', 'Send window': '9am-6pm', 'Channels': 'SMS + Email', 'Offer': 'Configured' },
        scout:  { 'Target ICP': 'Configured', 'Batch size': '500', 'Outreach': 'On', 'Geography': 'Local + 25mi' },
        forge:  { 'Theme': 'Live', 'A/B testing': 'On', 'Forms': '3 active', 'Analytics': 'Connected' },
        signal: { 'GEO score': '82/100', 'Tracked queries': '45', 'Schema': 'Deployed', 'Refresh': 'Weekly' },
        oracle: { 'Report cadence': 'Weekly', 'Competitors': '5 tracked', 'Alerts': 'On', 'Forecast horizon': '90 days' },
        flux:   { 'Environment': 'Production', 'Error alerts': 'On', 'Logs': 'Retained 30d', 'Deploy hook': 'Configured' }
      };
      const cfg = Object.keys(config||{}).length ? config : (defaults[agentId] || {});
      grid.innerHTML = Object.entries(cfg).map(([k,v]) =>
        '<div class="config-row"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>'
      ).join('');
    }

    init();
  </script>
</body>
</html>
